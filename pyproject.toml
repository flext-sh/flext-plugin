[tool.poetry]
name = "flx-plugin"
version = "0.1.0"
description = "FLX Plugin - Enterprise Plugin System with Hot Reload"
authors = ["FLX Team <team@flx.dev>"]
readme = "README.md"
python = "^3.13"
packages = [{include = "flx_plugin", from = "src"}]

[tool.poetry.dependencies]
python = "^3.13"
flx-core = {path = "../flx-core", develop = true}
pydantic = "^2.5.0"
click = "^8.1.7"
watchfiles = "^0.21.0"
importlib-metadata = "^7.0.0"
pyyaml = "^6.0.1"
toml = "^0.10.2"
packaging = "^23.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
mypy = "^1.5.0"
ruff = "^0.1.0"
black = "^23.0.0"
pytest-mock = "^3.12.0"

[tool.poetry.scripts]
flx-plugin = "flx_plugin.cli.main:cli"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88
exclude = ["__pycache__", ".venv", ".git", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "C90", "D", "UP", "S", "T", "ANN", "SIM", "ARG"]
ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
